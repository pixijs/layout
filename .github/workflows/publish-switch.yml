name: Publish switch

on:
  release:
    types: [ published ]
  push:
    branches:
      - main

permissions:
  id-token: write # Required for OIDC
  contents: write

jobs:
  publish-prod:
    if: github.event_name == 'release'
    uses: ./.github/workflows/publish.yaml
    permissions:
      id-token: write
      contents: write

  publish-branch:
    if: github.event_name == 'push'
    uses: ./.github/workflows/publish-branch.yaml
    permissions:
      id-token: write
      contents: write
